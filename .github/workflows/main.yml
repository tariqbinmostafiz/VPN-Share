name: Build Modified VPN Hotspot

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source
      uses: actions/checkout@v3

    - name: Setup JDK 17
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Grant execute permission
      run: chmod +x gradlew

    # 🔹 Package rename (global)
    - name: Replace package name
      run: |
        OLD="be.mygod.vpnhotspot"
        NEW="com.shifat.vpnshare"

        echo "Replacing package..."
        grep -rl "$OLD" . | xargs sed -i "s/$OLD/$NEW/g"

    # 🔹 Fix JNI naming (CRITICAL FIX)
    - name: Fix JNI naming
      run: |
        OLD_JNI="Java_com.shifat.vpnshare"
        NEW_JNI="Java_com_shifat_vpnshare"

        echo "Fixing JNI..."
        grep -rl "$OLD_JNI" mobile/src/main/cpp | xargs sed -i "s/$OLD_JNI/$NEW_JNI/g" || true

    # 🔹 Fix directory structure
    - name: Fix package directories
      run: |
        mkdir -p mobile/src/main/java/com/shifat/vpnshare
        if [ -d "mobile/src/main/java/be/mygod/vpnhotspot" ]; then
          mv mobile/src/main/java/be/mygod/vpnhotspot mobile/src/main/java/com/shifat/vpnshare
        fi

    # 🔹 Change app name
    - name: Change app name
      run: |
        sed -i 's/VPN Hotspot/VPN Share/g' mobile/src/main/res/values/strings.xml || true

    # 🔹 (Optional) Replace app icon
    - name: Replace app icon
      run: |
        ICON=assets/icon.png
        if [ -f "$ICON" ]; then
          for dir in mobile/src/main/res/mipmap-*; do
            cp $ICON $dir/ic_launcher.png || true
            cp $ICON $dir/ic_launcher_round.png || true
          done
        fi

    # 🔹 Clean build
    - name: Clean project
      run: ./gradlew clean

    # 🔹 Build APK
    - name: Build Debug APK
      run: ./gradlew assembleDebug

    # 🔹 Upload APK
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: vpnshare-apk
        path: mobile/build/outputs/apk/debug/mobile-debug.apk
