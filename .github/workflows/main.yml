name: Build Modified VPN Hotspot

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source
      uses: actions/checkout@v3

    - name: Setup JDK 17
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Grant execute permission
      run: chmod +x gradlew

    # 🔹 Package rename (global replace)
    - name: Replace package name
      run: |
        OLD="be.mygod.vpnhotspot"
        NEW="com.shifat.vpnshare"

        echo "Replacing package name..."
        grep -rl "$OLD" . | xargs sed -i "s/$OLD/$NEW/g"

    # 🔹 Fix directory structure (important)
    - name: Fix package directories
      run: |
        mkdir -p app/src/main/java/com/shifat
        if [ -d "app/src/main/java/be/mygod/vpnhotspot" ]; then
          mv app/src/main/java/be/mygod/vpnhotspot app/src/main/java/com/shifat/vpnshare
        fi

    # 🔹 Change app name
    - name: Change app name
      run: |
        sed -i 's/VPN Hotspot/VPN Share/g' app/src/main/res/values/strings.xml || true

    # 🔹 Clean build (avoid cache issue)
    - name: Clean project
      run: ./gradlew clean

    # 🔹 Build APK
    - name: Build Debug APK
      run: ./gradlew assembleDebug

    # 🔹 Upload result
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: vpnshare-apk
        path: app/build/outputs/apk/debug/app-debug.apk
